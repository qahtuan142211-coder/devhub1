<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHub Pro - Cloud Sync</title>
    <!-- THÊM THƯ VIỆN FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root[data-theme="dark"] {
            --bg-main: #0d1117; --bg-panel: #161b22; --bg-header: #010409;
            --border-color: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e;
            --accent-blue: #58a6ff; --btn-green: #238636; --btn-green-hover: #2ea043;
            --btn-red: #da3633; --btn-red-hover: #f85149; 
            --radius: 8px; --shadow: 0 8px 24px rgba(0,0,0,0.5); 
            --code-bg: #0d1117; --code-text: #e6edf3; --item-hover: #21262d;
        }

        :root[data-theme="light"] {
            --bg-main: #f4f6f8; --bg-panel: #ffffff; --bg-header: #ffffff;
            --border-color: #d0d7de; --text-main: #24292f; --text-muted: #57606a;
            --accent-blue: #0969da; --btn-green: #1f883d; --btn-green-hover: #1a7f37;
            --btn-red: #cf222e; --btn-red-hover: #a40e26;
            --radius: 8px; --shadow: 0 8px 24px rgba(140, 149, 159, 0.2); 
            --code-bg: #f6f8fa; --code-text: #24292f; --item-hover: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }

        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        .hidden { display: none !important; }

        .container { max-width: 1000px; margin: 40px auto; width: 100%; padding: 0 20px; flex: 1; }
        
        header { background-color: var(--bg-header); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--text-main); }
        .user-info { display: flex; align-items: center; gap: 15px; }

        button { 
            cursor: pointer; padding: 8px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; 
            border: 1px solid var(--border-color); background: var(--bg-panel); color: var(--text-main); 
        }
        button:hover { background: var(--item-hover); border-color: var(--text-muted); }
        .btn-primary { background: var(--btn-green); color: white; border-color: transparent; }
        .btn-primary:hover { background: var(--btn-green-hover); }
        .btn-danger { background: transparent; color: var(--btn-red-hover); border-color: var(--border-color); }
        .btn-danger:hover { background: var(--btn-red); color: white; }
        
        input[type="text"], input[type="password"] { padding: 10px 14px; background: var(--bg-panel); border: 1px solid var(--border-color); color: var(--text-main); border-radius: var(--radius); outline: none; width: 100%;}
        
        .auth-box { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 35px; border-radius: var(--radius); width: 400px; margin: 60px auto; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; }

        .toolbar { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .file-list { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: var(--radius); overflow: hidden; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border-color); }
        .file-info { cursor: pointer; flex: 1; font-family: monospace; font-size: 15px; color: var(--accent-blue);}
        
        .editor-header { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        #filenameInput { font-family: monospace; font-size: 16px; font-weight: bold; flex: 1; }
        .code-area { width: 100%; height: 520px; background: var(--code-bg); color: var(--code-text); font-family: 'Fira Code', monospace; padding: 20px; border: 1px solid var(--border-color); border-radius: var(--radius); resize: vertical; outline: none; }

        /* Loader */
        .cloud-syncing { font-size: 12px; color: var(--accent-blue); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        #toastContainer { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
        .toast { min-width: 260px; padding: 14px 20px; border-radius: var(--radius); background: var(--bg-panel); border-left: 5px solid var(--accent-blue); font-size: 14px; }
    </style>
</head>
<body>
    <div id="toastContainer"></div>

    <header id="mainHeader" class="hidden">
        <div class="logo">☁️ DevHub Cloud</div>
        <div class="user-info">
            <span id="syncStatus" class="cloud-syncing hidden">Đang đồng bộ... ☁️</span>
            <span id="displayUsername" style="font-weight: 600;"></span>
            <button onclick="App.logout()">🚪 Đăng xuất</button>
        </div>
    </header>

    <div id="authScreen" class="container">
        <div class="auth-box">
            <h2 style="text-align:center; margin-bottom:20px;">Đăng Nhập Đám Mây</h2>
            <div class="input-group">
                <label>Tên đăng nhập (Username)</label>
                <input type="text" id="loginUser">
            </div>
            <div class="input-group">
                <label>Mật khẩu (Password)</label>
                <input type="password" id="loginPass">
            </div>
            <button class="btn-primary" style="width:100%; margin-bottom: 10px;" onclick="Auth.login()">Đăng Nhập</button>
            <button style="width:100%;" onclick="Auth.register()">Tạo Tài Khoản Mới</button>
        </div>
    </div>

    <div id="dashboardScreen" class="container hidden">
        <div class="toolbar">
            <h2>Kho Code Của Bạn</h2>
            <button class="btn-primary" onclick="App.openEditor()">➕ Tạo File Mới</button>
        </div>
        <div class="file-list" id="fileListContainer"></div>
    </div>

    <div id="editorScreen" class="container hidden">
        <div class="editor-header">
            <button onclick="App.showDashboard()">🔙 Quay lại</button>
            <input type="text" id="filenameInput" placeholder="Tên file (VD: script.js)">
            <button class="btn-primary" onclick="App.saveFile()">☁️ Lưu lên Cloud</button>
        </div>
        <textarea id="codeEditor" class="code-area"></textarea>
    </div>

    <script>
        // ==========================================
        // 1. DÁN FIREBASE CONFIG CỦA BẠN VÀO ĐÂY
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "devhub-project3000.firebaseapp.com",
            projectId: "devhub-project3000",
            storageBucket: "devhub-project3000.appspot.com",
            messagingSenderId: "181873508934",
            appId: "1:181873508934:web:3d6d087d942f8140efc047",
            measurementId: "G-SPXTDDCY8"
        };

        // ==========================================
        // 2. KHỞI TẠO FIREBASE CLOUD
        // ==========================================
        if(!firebaseConfig.apiKey) {
            alert("LỖI: Bạn chưa dán cấu hình Firebase config vào code!");
        } else {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const Toast = {
            show: (msg) => {
                const c = document.getElementById('toastContainer');
                const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
                c.appendChild(t); setTimeout(() => t.remove(), 3000);
            }
        };

        const SyncUI = {
            show: () => document.getElementById('syncStatus').classList.remove('hidden'),
            hide: () => document.getElementById('syncStatus').classList.add('hidden')
        };

        let currentUser = null;
        let currentFiles = [];
        let editingId = null;

        const Auth = {
            register: async () => {
                const u = document.getElementById('loginUser').value.trim();
                const p = document.getElementById('loginPass').value.trim();
                if(!u || !p) return Toast.show("Nhập đủ thông tin!");
                
                SyncUI.show();
                try {
                    const docRef = await db.collection("users").doc(u).get();
                    if(docRef.exists) { Toast.show("Tài khoản đã tồn tại!"); }
                    else {
                        await db.collection("users").doc(u).set({ password: p });
                        currentUser = u;
                        Toast.show("Đăng ký thành công!");
                        App.showDashboard();
                    }
                } catch(e) { console.error(e); Toast.show("Lỗi mạng!"); }
                SyncUI.hide();
            },
            login: async () => {
                const u = document.getElementById('loginUser').value.trim();
                const p = document.getElementById('loginPass').value.trim();
                if(!u || !p) return Toast.show("Nhập đủ thông tin!");

                SyncUI.show();
                try {
                    const docRef = await db.collection("users").doc(u).get();
                    if(docRef.exists && docRef.data().password === p) {
                        currentUser = u;
                        Toast.show("Đăng nhập thành công!");
                        App.showDashboard();
                    } else { Toast.show("Sai tài khoản hoặc mật khẩu!"); }
                } catch(e) { console.error(e); Toast.show("Lỗi mạng!"); }
                SyncUI.hide();
            }
        };

        const App = {
            logout: () => { currentUser = null; document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('mainHeader').classList.add('hidden'); document.getElementById('dashboardScreen').classList.add('hidden'); document.getElementById('editorScreen').classList.add('hidden'); },
            showDashboard: async () => {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('editorScreen').classList.add('hidden');
                document.getElementById('mainHeader').classList.remove('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                document.getElementById('displayUsername').innerText = `👤 ${currentUser}`;
                
                SyncUI.show();
                currentFiles = [];
                const snapshot = await db.collection("users").doc(currentUser).collection("files").get();
                snapshot.forEach(doc => { currentFiles.push({ id: doc.id, ...doc.data() }); });
                SyncUI.hide();
                App.renderFiles();
            },
            renderFiles: () => {
                const c = document.getElementById('fileListContainer'); c.innerHTML = '';
                currentFiles.forEach(f => {
                    const div = document.createElement('div'); div.className = 'file-item';
                    div.innerHTML = `
                        <div class="file-info" onclick="App.openEditor('${f.id}')">📄 ${f.name}</div>
                        <button class="btn-danger" onclick="App.deleteFile('${f.id}')">Xóa</button>
                    `;
                    c.appendChild(div);
                });
            },
            openEditor: (id = null) => {
                editingId = id;
                const i = document.getElementById('filenameInput');
                const e = document.getElementById('codeEditor');
                if (id) {
                    const file = currentFiles.find(f => f.id === id);
                    i.value = file.name; e.value = file.content;
                } else {
                    i.value = `file_${Math.floor(Math.random()*1000)}.js`; e.value = '';
                }
                document.getElementById('dashboardScreen').classList.add('hidden');
                document.getElementById('editorScreen').classList.remove('hidden');
            },
            saveFile: async () => {
                const name = document.getElementById('filenameInput').value.trim();
                const content = document.getElementById('codeEditor').value;
                if (!name) return Toast.show("Thiếu tên file!");

                SyncUI.show();
                const collectionRef = db.collection("users").doc(currentUser).collection("files");
                if (editingId) {
                    await collectionRef.doc(editingId).update({ name, content, timestamp: Date.now() });
                } else {
                    await collectionRef.add({ name, content, timestamp: Date.now() });
                }
                SyncUI.hide();
                Toast.show("Đã đẩy code lên Đám Mây thành công! ☁️");
                App.showDashboard();
            },
            deleteFile: async (id) => {
                if(!confirm("Xóa file này vĩnh viễn trên Cloud?")) return;
                SyncUI.show();
                await db.collection("users").doc(currentUser).collection("files").doc(id).delete();
                SyncUI.hide();
                App.showDashboard();
            }
        };
    </script>
</body>
</html>
